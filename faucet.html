<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AGC Faucet</title>

<script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.min.js"></script>

<style>

body{
background:#0f172a;
font-family:Arial;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
background:#1e293b;
padding:30px;
border-radius:12px;
width:380px;
text-align:center;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:6px;
background:#3b82f6;
color:white;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#2563eb;
}

.info{
margin-top:10px;
font-size:14px;
color:#cbd5f5;
}

#status{
margin-top:15px;
font-size:14px;
}

</style>
</head>

<body>

<div class="box">

<h2>AGC Faucet</h2>

<button onclick="connect()">Connect Wallet</button>

<div class="info" id="wallet">Wallet: not connected</div>
<div class="info" id="balance">AGC Balance: 0</div>
<div class="info" id="cooldown"></div>

<button onclick="claim()">Claim 0.1 AGC</button>

<p id="status"></p>

</div>

<script>

const faucetAddress="0x94f6b5d4a5972116FF5B5161A462fe616BFCd115";

const faucetABI=[
"function claim()",
"function lastClaim(address) view returns(uint256)"
];

const tokenABI=[
"function balanceOf(address) view returns(uint256)",
"function decimals() view returns(uint8)"
];

const tokenAddress="0x9bfaC367F4C025f1883511A36a51ed69c7Be08C9";

let signer;
let faucet;
let token;
let user;

async function connect(){

await window.ethereum.request({method:'eth_requestAccounts'});

const provider=new ethers.providers.Web3Provider(window.ethereum);

signer=provider.getSigner();

user=await signer.getAddress();

faucet=new ethers.Contract(faucetAddress,faucetABI,signer);

token=new ethers.Contract(tokenAddress,tokenABI,provider);

document.getElementById("wallet").innerText="Wallet: "+user;

updateBalance();
checkCooldown();

status("Wallet connected");

}

async function updateBalance(){

const decimals=await token.decimals();

const bal=await token.balanceOf(user);

const formatted=ethers.utils.formatUnits(bal,decimals);

document.getElementById("balance").innerText="AGC Balance: "+formatted;

}

async function checkCooldown(){

const last=await faucet.lastClaim(user);

const next=Number(last)+86400;

setInterval(()=>{

const now=Math.floor(Date.now()/1000);

if(now>=next){

document.getElementById("cooldown").innerText="Ready to claim";

}else{

let left=next-now;

let h=Math.floor(left/3600);

let m=Math.floor((left%3600)/60);

let s=left%60;

document.getElementById("cooldown").innerText=
"Next claim in "+h+"h "+m+"m "+s+"s";

}

},1000);

}

async function claim(){

try{

status("Sending transaction...");

const tx=await faucet.claim();

await tx.wait();

status("AGC received!");

updateBalance();

}catch(err){

status("Transaction failed");

}

}

function status(msg){

document.getElementById("status").innerText=msg;

}

</script>

</body>
</html>
